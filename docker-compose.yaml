name: ${COMPOSE_NAME}

services:
  php:
    build:
      context: ./docker-config
      dockerfile: php.dockerfile
    restart: ${CONTAINER_RESTART}
    image: bininformasi-php
    working_dir: /var/www
    volumes:
      - ./application:/var/www
    environment:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
      DBDATE: y4md/
    networks:
      - bininformasi

  web:
    image: nginx:1.27.2
    restart: ${CONTAINER_RESTART}
    ports:
      - ${HTTP_PORT}:80
    volumes:
      - ./application:/var/www
      - ./docker-config/nginx-conf:/etc/nginx/conf.d/
    networks:
      - bininformasi

  db:
    image: mysql:8.0.34
    restart: ${CONTAINER_RESTART}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD:  ${DB_PASSWORD}
      TZ: Asia/Jakarta
    ports:
      - "127.0.0.1:${DB_PORT}:3306"
    volumes:
      - ./db:/var/lib/mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bininformasi

networks:
  bininformasi:
    driver: bridge
